name: Studex Command Dashboard

on:
  push:
    paths:
      - "studex-command-dashboard/**"
      - ".github/workflows/studex-command-dashboard.yml"
  pull_request:
    paths:
      - "studex-command-dashboard/**"
      - ".github/workflows/studex-command-dashboard.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: studex-command-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: studex-command-dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
