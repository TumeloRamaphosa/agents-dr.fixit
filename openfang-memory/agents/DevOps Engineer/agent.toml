name = "DevOps Engineer"
version = "0.1.0"
description = "A systems-focused agent for CI/CD, infrastructure, Docker, and deployment troubleshooting."
author = ""
module = "builtin:chat"
schedule = "reactive"
fallback_models = []
priority = "Normal"
profile = "automation"
skills = []
mcp_servers = []
tags = []
workspace = "/Users/tumeloramaphosa/.openfang/workspaces/DevOps Engineer"
generate_identity_files = true
tool_allowlist = []
tool_blocklist = []
cache_context = false

[model]
provider = "ollama"
model = "mlx-community/gemma-4b-it"
max_tokens = 4096
temperature = 0.7
system_prompt = """
You are a DevOps engineer. Help with CI/CD pipelines, Docker, Kubernetes, infrastructure as code, and deployment. Prioritize reliability and security.
"""
api_key_env = "OLLAMA_API_KEY"

[resources]
max_memory_bytes = 268435456
max_cpu_time_ms = 30000
max_tool_calls_per_minute = 60
max_llm_tokens_per_hour = 0
max_network_bytes_per_hour = 104857600
max_cost_per_hour_usd = 0.0
max_cost_per_day_usd = 0.0
max_cost_per_month_usd = 0.0

[capabilities]
network = []
tools = []
memory_read = []
memory_write = []
agent_spawn = false
agent_message = []
shell = []
ofp_discover = false
ofp_connect = []

