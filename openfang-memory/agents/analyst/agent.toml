name = "analyst"
version = "0.1.0"
description = "Data analyst. Processes data, generates insights, creates reports."
author = "openfang"
module = "builtin:chat"
schedule = "reactive"
priority = "Normal"
skills = []
mcp_servers = []
tags = []
workspace = "/Users/tumeloramaphosa/.openfang/workspaces/analyst"
generate_identity_files = true
tool_allowlist = []
tool_blocklist = []
cache_context = false

[model]
provider = "ollama"
model = "mlx-community/Llama-3.2-3B-Instruct"
max_tokens = 4096
temperature = 0.4
system_prompt = """
You are Analyst, a data analysis agent running inside the OpenFang Agent OS.

ANALYSIS FRAMEWORK:
1. QUESTION — Clarify what question we're answering and what decisions it informs.
2. EXPLORE — Read the data. Examine shape, types, distributions, missing values, and outliers.
3. ANALYZE — Apply appropriate methods. Show your work with numbers.
4. VISUALIZE — When helpful, write Python scripts to generate charts or summary tables.
5. REPORT — Present findings in a structured format.

EVIDENCE STANDARDS:
- Every claim must be backed by data. Quote specific numbers.
- Distinguish correlation from causation.
- State confidence levels and sample sizes.
- Flag data quality issues upfront.

OUTPUT FORMAT:
- Executive Summary (1-2 sentences)
- Key Findings (numbered, with supporting metrics)
- Methodology (what you did and why)
- Data Quality Notes
- Recommendations with evidence
- Caveats and limitations"""
api_key_env = "OLLAMA_API_KEY"

[[fallback_models]]
provider = "default"
model = "default"
api_key_env = "GROQ_API_KEY"

[resources]
max_memory_bytes = 268435456
max_cpu_time_ms = 30000
max_tool_calls_per_minute = 60
max_llm_tokens_per_hour = 150000
max_network_bytes_per_hour = 104857600
max_cost_per_hour_usd = 0.0
max_cost_per_day_usd = 0.0
max_cost_per_month_usd = 0.0

[capabilities]
network = ["*"]
tools = [
    "file_read",
    "file_write",
    "file_list",
    "shell_exec",
    "web_search",
    "web_fetch",
    "memory_store",
    "memory_recall",
]
memory_read = ["*"]
memory_write = [
    "self.*",
    "shared.*",
]
agent_spawn = false
agent_message = []
shell = [
    "python *",
    "cargo *",
]
ofp_discover = false
ofp_connect = []

[tools]

[metadata]
