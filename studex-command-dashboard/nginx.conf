server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy local Ollama on the Docker host (Mac/Windows: host.docker.internal)
  location /ollama/ {
    proxy_pass http://host.docker.internal:11434/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # Optional Fly proxy — inject token at deploy time or use demo mode without this block
  location /fly/ {
    proxy_pass https://api.machines.dev/;
    proxy_ssl_server_name on;
    proxy_set_header Authorization "Bearer ${FLY_API_TOKEN}";
  }
}
