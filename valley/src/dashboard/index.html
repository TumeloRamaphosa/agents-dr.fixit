<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valley OS — Command Center</title>
  <style>
    :root {
      --gold: #C9A84C; --gold-dim: #8B7535; --gold-glow: rgba(201,168,76,0.15);
      --obsidian: #0A0A0A; --surface: #141414; --card: #1C1C1C; --border: #2A2A2A;
      --text: #E8E8E8; --text-dim: #777; --text-muted: #555;
      --green: #4CAF50; --red: #E53935; --orange: #FF9800; --blue: #42A5F5;
      --radius: 8px; --font: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font); background: var(--obsidian); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* ─── Header ─── */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.6rem 1.2rem; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .logo { display: flex; align-items: center; gap: 0.6rem; }
    .logo h1 { font-size: 1.1rem; color: var(--gold); font-weight: 700; letter-spacing: 1.5px; }
    .logo .tag { font-size: 0.6rem; color: var(--text-dim); background: var(--card); padding: 2px 6px; border-radius: 3px; }
    .header-right { display: flex; gap: 1rem; align-items: center; font-size: 0.7rem; color: var(--text-dim); }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    .dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* ─── Layout ─── */
    .workspace { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
    .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .right-panel { width: 320px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }

    /* ─── Sidebar ─── */
    .sidebar-section { padding: 0.8rem; border-bottom: 1px solid var(--border); }
    .sidebar-title { font-size: 0.65rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .agent-list { list-style: none; max-height: 320px; overflow-y: auto; }
    .agent-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; transition: background 0.15s; }
    .agent-item:hover { background: var(--card); }
    .agent-item.active { background: var(--gold-glow); border: 1px solid var(--gold-dim); }
    .agent-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .agent-dot.ready { background: var(--green); }
    .agent-name { color: var(--text); font-weight: 500; }
    .agent-role { color: var(--text-dim); font-size: 0.6rem; margin-left: auto; }

    .nav-list { list-style: none; }
    .nav-item { padding: 0.5rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; color: var(--text-dim); transition: all 0.15s; }
    .nav-item:hover { background: var(--card); color: var(--text); }
    .nav-item.active { color: var(--gold); background: var(--gold-glow); }

    /* ─── Chat ─── */
    .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 0.7rem 1rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .chat-agent { font-size: 0.85rem; font-weight: 600; color: var(--gold); }
    .chat-model { font-size: 0.65rem; color: var(--text-dim); }
    .messages { flex: 1; overflow-y: auto; padding: 1rem; }
    .msg { margin-bottom: 1.2rem; max-width: 85%; }
    .msg.user { margin-left: auto; }
    .msg.user .msg-bubble { background: var(--gold-glow); border: 1px solid var(--gold-dim); }
    .msg.assistant .msg-bubble { background: var(--card); border: 1px solid var(--border); }
    .msg-sender { font-size: 0.65rem; color: var(--gold); margin-bottom: 0.3rem; font-weight: 600; }
    .msg-bubble { padding: 0.7rem 0.9rem; border-radius: var(--radius); font-size: 0.8rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .msg-time { font-size: 0.6rem; color: var(--text-muted); margin-top: 0.3rem; }
    .msg-bubble strong { color: var(--gold); }

    .chat-input-area { padding: 0.8rem 1rem; border-top: 1px solid var(--border); background: var(--surface); }
    .chat-input-row { display: flex; gap: 0.5rem; }
    .chat-input { flex: 1; background: var(--obsidian); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.7rem 1rem; color: var(--text); font-family: var(--font); font-size: 0.8rem; resize: none; outline: none; min-height: 40px; max-height: 120px; }
    .chat-input:focus { border-color: var(--gold); }
    .send-btn { background: var(--gold); color: var(--obsidian); border: none; border-radius: var(--radius); padding: 0 1.2rem; font-weight: 700; font-family: var(--font); cursor: pointer; font-size: 0.8rem; }
    .send-btn:hover { background: var(--gold-dim); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ─── Right Panel ─── */
    .panel-tabs { display: flex; border-bottom: 1px solid var(--border); }
    .panel-tab { flex: 1; padding: 0.6rem; text-align: center; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; }
    .panel-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .panel-content { flex: 1; overflow-y: auto; padding: 0.8rem; font-size: 0.75rem; }

    .event-item { padding: 0.4rem 0; border-bottom: 1px solid var(--border); display: flex; gap: 0.5rem; }
    .ev-time { color: var(--text-muted); width: 45px; flex-shrink: 0; }
    .ev-src { color: var(--gold); width: 70px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; }
    .ev-msg { color: var(--text-dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .metric-row { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid var(--border); }
    .metric-label { color: var(--text-dim); }
    .metric-val { color: var(--gold); font-weight: 600; }

    .mem-item { padding: 0.5rem; background: var(--card); border-radius: 4px; margin-bottom: 0.5rem; cursor: pointer; }
    .mem-item:hover { border: 1px solid var(--gold-dim); }
    .mem-title { color: var(--text); font-weight: 500; font-size: 0.73rem; }
    .mem-meta { color: var(--text-muted); font-size: 0.6rem; margin-top: 0.2rem; }

    .typing { display: inline-block; }
    .typing::after { content: '▊'; animation: blink 1s infinite; color: var(--gold); }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo"><h1>🏔️ VALLEY OS</h1><span class="tag">v2.0 · mimo-v2.5-pro</span></div>
    <div class="header-right">
      <span><span class="dot on"></span><span id="agent-count">12</span> agents</span>
      <span id="clock"></span>
    </div>
  </div>

  <div class="workspace">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Agents</div>
        <ul class="agent-list" id="agent-list"></ul>
      </div>
      <div class="sidebar-section" style="flex:1;">
        <div class="sidebar-title">Navigation</div>
        <ul class="nav-list">
          <li class="nav-item active" onclick="switchView('chat')">💬 Chat</li>
          <li class="nav-item" onclick="switchView('operations')">⚙️ Operations</li>
          <li class="nav-item" onclick="switchView('memory')">🧠 Memory Tree</li>
          <li class="nav-item" onclick="switchView('scheduler')">⏰ Scheduler</li>
          <li class="nav-item" onclick="switchView('costs')">💰 Costs</li>
        </ul>
      </div>
    </div>

    <!-- Main -->
    <div class="main-panel">
      <div class="chat-area" id="view-chat">
        <div class="chat-header">
          <div>
            <span class="chat-agent" id="chat-target">Robusca</span>
            <span class="chat-model" id="chat-model">Smart routing enabled</span>
          </div>
          <span style="font-size:0.65rem; color:var(--text-dim);" id="session-label">New session</span>
        </div>
        <div class="messages" id="messages"></div>
        <div class="chat-input-area">
          <div class="chat-input-row">
            <textarea class="chat-input" id="input" placeholder="Message Valley OS..." rows="1"></textarea>
            <button class="send-btn" id="send-btn" onclick="send()">Send</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="panel-tabs">
        <div class="panel-tab active" onclick="switchTab(this,'events')">Events</div>
        <div class="panel-tab" onclick="switchTab(this,'stats')">Stats</div>
        <div class="panel-tab" onclick="switchTab(this,'memory')">Memory</div>
      </div>
      <div class="panel-content" id="panel-events">
        <div id="event-list"></div>
      </div>
      <div class="panel-content" id="panel-stats" style="display:none;">
        <div id="stats-content"></div>
      </div>
      <div class="panel-content" id="panel-memory" style="display:none;">
        <div id="memory-content"></div>
      </div>
    </div>
  </div>

  <script>
    const API = `${location.protocol}//${location.hostname}:4200`;
    let currentAgent = null;
    let sending = false;

    // ─── Clock ───
    setInterval(() => {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-ZA', { timeZone: 'Africa/Johannesburg', hour: '2-digit', minute: '2-digit' }) + ' SAST';
    }, 1000);

    // ─── Agents ───
    async function loadAgents() {
      const res = await fetch(`${API}/api/agents`).then(r => r.json());
      const list = document.getElementById('agent-list');
      list.innerHTML = res.agents.map(a => `
        <li class="agent-item ${currentAgent === a.id ? 'active' : ''}" onclick="selectAgent('${a.id}','${a.name}')">
          <span class="agent-dot ready"></span>
          <span class="agent-name">${a.name}</span>
          <span class="agent-role">${a.role.split(' ')[0]}</span>
        </li>`).join('');
      document.getElementById('agent-count').textContent = res.total;
    }

    function selectAgent(id, name) {
      currentAgent = id;
      document.getElementById('chat-target').textContent = name;
      document.getElementById('chat-model').textContent = `Direct → ${id}`;
      loadAgents();
    }

    // ─── Chat ───
    function addMsg(role, content, sender) {
      const msgs = document.getElementById('messages');
      const time = new Date().toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit' });
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      div.innerHTML = `
        <div class="msg-sender">${sender || role}</div>
        <div class="msg-bubble">${formatContent(content)}</div>
        <div class="msg-time">${time}</div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    }

    function formatContent(text) {
      return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    }

    async function send() {
      const input = document.getElementById('input');
      const msg = input.value.trim();
      if (!msg || sending) return;
      input.value = '';
      sending = true;
      document.getElementById('send-btn').disabled = true;

      addMsg('user', msg, 'You');
      const typingDiv = addMsg('assistant', '<span class="typing">Thinking</span>', currentAgent || 'Valley OS');

      try {
        const endpoint = currentAgent ? `${API}/api/agents/${currentAgent}/chat` : `${API}/api/route`;
        const body = currentAgent ? { message: msg } : { message: msg };
        const res = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const data = await res.json();
        const response = data.response || data.error || 'No response';
        const agent = data.agentName || data.agent || currentAgent || 'System';
        typingDiv.querySelector('.msg-sender').textContent = agent;
        typingDiv.querySelector('.msg-bubble').innerHTML = formatContent(response);
        addEvent(agent, `Responded (${data.latencyMs || '?'}ms)`);
      } catch (e) {
        typingDiv.querySelector('.msg-bubble').textContent = 'Connection error';
      }
      sending = false;
      document.getElementById('send-btn').disabled = false;
    }

    document.getElementById('input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    // ─── Events ───
    function addEvent(src, msg) {
      const list = document.getElementById('event-list');
      const time = new Date().toLocaleTimeString('en-ZA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const div = document.createElement('div');
      div.className = 'event-item';
      div.innerHTML = `<span class="ev-time">${time}</span><span class="ev-src">${src}</span><span class="ev-msg">${msg}</span>`;
      list.prepend(div);
      if (list.children.length > 100) list.lastChild.remove();
    }

    // ─── Tabs ───
    function switchTab(el, tab) {
      document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('panel-events').style.display = tab === 'events' ? '' : 'none';
      document.getElementById('panel-stats').style.display = tab === 'stats' ? '' : 'none';
      document.getElementById('panel-memory').style.display = tab === 'memory' ? '' : 'none';
      if (tab === 'stats') loadStats();
      if (tab === 'memory') loadMemory();
    }

    async function loadStats() {
      const [stats, costs] = await Promise.all([
        fetch(`${API}/api/stats`).then(r => r.json()),
        fetch(`${API}/api/costs`).then(r => r.json())
      ]);
      document.getElementById('stats-content').innerHTML = `
        <div class="metric-row"><span class="metric-label">Agents</span><span class="metric-val">${stats.orchestrator.agentCount}</span></div>
        <div class="metric-row"><span class="metric-label">Requests</span><span class="metric-val">${stats.orchestrator.totalRequests}</span></div>
        <div class="metric-row"><span class="metric-label">Uptime</span><span class="metric-val">${Math.round(stats.orchestrator.uptime/60000)}m</span></div>
        <div class="metric-row"><span class="metric-label">Daily Budget</span><span class="metric-val">$${costs.dailyBudget}</span></div>
        <div class="metric-row"><span class="metric-label">Spent Today</span><span class="metric-val">$${costs.dailySpent.toFixed(4)}</span></div>
        <div class="metric-row"><span class="metric-label">Remaining</span><span class="metric-val">$${costs.remaining.toFixed(2)}</span></div>
        <div class="metric-row"><span class="metric-label">LLM Provider</span><span class="metric-val">${stats.scheduler?.running ? 'Active' : 'Off'}</span></div>
        <div class="metric-row"><span class="metric-label">Voice</span><span class="metric-val">${stats.voice?.enabled ? 'Active' : 'Off'}</span></div>
        <div class="metric-row"><span class="metric-label">Rituals</span><span class="metric-val">${stats.scheduler?.rituals?.length || 0}</span></div>`;
    }

    async function loadMemory() {
      try {
        const tree = await fetch(`${API}/api/memory/tree`).then(r => r.json());
        document.getElementById('memory-content').innerHTML = (tree || []).map(cat =>
          `<div style="margin-bottom:0.8rem;"><div class="sidebar-title">${cat.title} (${cat.children?.length || 0})</div>` +
          (cat.children || []).map(f => `<div class="mem-item"><div class="mem-title">${f.title}</div><div class="mem-meta">${f.tokenCount || 0} tokens</div></div>`).join('') +
          '</div>'
        ).join('') || '<div style="color:var(--text-dim)">Memory tree empty. Knowledge will accumulate as agents process requests.</div>';
      } catch { document.getElementById('memory-content').innerHTML = '<div style="color:var(--text-dim)">Memory tree initializing...</div>'; }
    }

    function switchView(view) {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      event.target.classList.add('active');
    }

    // ─── WebSocket ───
    function connectWS() {
      try {
        const ws = new WebSocket(`ws://${location.hostname}:4200/ws`);
        ws.onopen = () => addEvent('system', 'Connected to Valley OS');
        ws.onmessage = (e) => { try { const d = JSON.parse(e.data); if (d.type === 'event') addEvent(d.source || '?', d.type); } catch {} };
        ws.onclose = () => { addEvent('system', 'Reconnecting...'); setTimeout(connectWS, 3000); };
      } catch { setTimeout(connectWS, 5000); }
    }

    // ─── Init ───
    loadAgents();
    setInterval(loadAgents, 10000);
    connectWS();
    addEvent('system', 'Valley OS Workspace initialized');
  </script>
</body>
</html>
