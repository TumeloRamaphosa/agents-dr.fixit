<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valley OS — Agent Command Deck</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050505; color: #E8E8E8; font-family: 'SF Mono', monospace; overflow: hidden; }
    #canvas { width: 100vw; height: 100vh; display: block; }
    .overlay { position: fixed; top: 0; left: 0; right: 0; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; pointer-events: none; z-index: 10; }
    .title { font-size: 1.4rem; color: #C9A84C; font-weight: 700; letter-spacing: 2px; text-shadow: 0 0 20px rgba(201,168,76,0.4); }
    .subtitle { font-size: 0.7rem; color: #666; margin-top: 0.2rem; }
    .status { font-size: 0.75rem; color: #777; text-align: right; }
    .status .live { color: #4CAF50; }
    .agent-info { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: rgba(20,20,20,0.95); border: 1px solid #C9A84C; border-radius: 12px; padding: 1rem 2rem; text-align: center; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 10; }
    .agent-info.show { opacity: 1; }
    .agent-info h3 { color: #C9A84C; font-size: 1.1rem; margin-bottom: 0.3rem; }
    .agent-info p { color: #999; font-size: 0.8rem; }
    .agent-info .role { color: #E0C068; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="overlay">
    <div>
      <div class="title">🏔️ VALLEY OS — AGENT COMMAND DECK</div>
      <div class="subtitle">12 Transformers · Real-time Agent Visualization</div>
    </div>
    <div class="status">
      <div><span class="live">●</span> LIVE</div>
      <div id="clock"></div>
    </div>
  </div>
  <div class="agent-info" id="agent-info">
    <h3 id="info-name"></h3>
    <div class="role" id="info-role"></div>
    <p id="info-status"></p>
  </div>
  <canvas id="canvas"></canvas>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const API = `${location.protocol}//${location.hostname}:4200`;

    // ─── Agent Transformer Configs ─────────────────────────────────────────
    const AGENTS = [
      { id: 'robusca', name: 'Robusca', role: 'Standup Host', color: 0xC9A84C, bodyType: 'commander', pos: [0, 0, 0] },
      { id: 'cto', name: 'CTO', role: 'Chief Technology', color: 0x42A5F5, bodyType: 'heavy', pos: [4, 0, 2] },
      { id: 'openclaw', name: 'OpenClaw', role: 'Execution', color: 0x66BB6A, bodyType: 'slim', pos: [-4, 0, 2] },
      { id: 'cashclaw', name: 'CashClaw', role: 'Sales', color: 0xFFA726, bodyType: 'bulky', pos: [6, 0, -2] },
      { id: 'denchclaw', name: 'DenchClaw', role: 'Customer', color: 0xEC407A, bodyType: 'elegant', pos: [-6, 0, -2] },
      { id: 'charlie', name: 'Charlie', role: 'Meat Agent', color: 0x8D6E63, bodyType: 'stocky', pos: [2, 0, -4] },
      { id: 'goose', name: 'Goose', role: 'Docs', color: 0xAB47BC, bodyType: 'tall', pos: [-2, 0, -4] },
      { id: 'hermes', name: 'Hermes', role: 'Research', color: 0x5C6BC0, bodyType: 'giant', pos: [0, 0, -6] },
      { id: 'skunkworks', name: 'Skunk Works', role: 'DevOps', color: 0x78909C, bodyType: 'angular', pos: [5, 0, -5] },
      { id: 'clawx', name: 'ClawX', role: 'Automation', color: 0x26A69A, bodyType: 'spider', pos: [-5, 0, -5] },
      { id: 'research', name: 'Research', role: 'Trends', color: 0x7E57C2, bodyType: 'scout', pos: [3, 0, 5] },
      { id: 'drfixit', name: 'Dr Fix-It', role: 'Watchdog', color: 0xEF5350, bodyType: 'medic', pos: [-3, 0, 5] },
    ];

    // ─── Scene Setup ──────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050505, 0.025);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 12, 16);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.minDistance = 5;
    controls.maxDistance = 30;

    // ─── Lighting ──────────────────────────────────────────────────────────
    const ambient = new THREE.AmbientLight(0x222222, 1);
    scene.add(ambient);

    const mainLight = new THREE.DirectionalLight(0xC9A84C, 0.8);
    mainLight.position.set(5, 10, 5);
    mainLight.castShadow = true;
    scene.add(mainLight);

    const blueLight = new THREE.PointLight(0x42A5F5, 0.5, 20);
    blueLight.position.set(-5, 5, -5);
    scene.add(blueLight);

    const redLight = new THREE.PointLight(0xEF5350, 0.3, 15);
    redLight.position.set(5, 3, 5);
    scene.add(redLight);

    // ─── Ground ────────────────────────────────────────────────────────────
    const groundGeo = new THREE.PlaneGeometry(40, 40);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x0A0A0A, metalness: 0.8, roughness: 0.4 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grid
    const grid = new THREE.GridHelper(40, 40, 0x1A1A1A, 0x111111);
    scene.add(grid);

    // ─── Build Transformer Robot ───────────────────────────────────────────
    function buildTransformer(config) {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({ color: config.color, metalness: 0.7, roughness: 0.3, emissive: config.color, emissiveIntensity: 0.1 });
      const darkMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.2 });
      const glowMat = new THREE.MeshStandardMaterial({ color: config.color, emissive: config.color, emissiveIntensity: 0.8 });

      // Torso
      const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.6, 0.8), mat);
      torso.position.y = 2.5;
      group.add(torso);

      // Head
      const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), darkMat);
      head.position.y = 3.7;
      group.add(head);

      // Visor (eyes)
      const visor = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.15, 0.1), glowMat);
      visor.position.set(0, 3.75, 0.35);
      group.add(visor);

      // Shoulders
      const shoulderGeo = new THREE.SphereGeometry(0.35, 8, 8);
      const lShoulder = new THREE.Mesh(shoulderGeo, mat);
      lShoulder.position.set(-0.9, 3.1, 0);
      group.add(lShoulder);
      const rShoulder = new THREE.Mesh(shoulderGeo, mat);
      rShoulder.position.set(0.9, 3.1, 0);
      group.add(rShoulder);

      // Arms
      const armGeo = new THREE.BoxGeometry(0.3, 1.2, 0.3);
      const lArm = new THREE.Mesh(armGeo, darkMat);
      lArm.position.set(-0.9, 2.2, 0);
      group.add(lArm);
      const rArm = new THREE.Mesh(armGeo, darkMat);
      rArm.position.set(0.9, 2.2, 0);
      group.add(rArm);

      // Legs
      const legGeo = new THREE.BoxGeometry(0.4, 1.4, 0.4);
      const lLeg = new THREE.Mesh(legGeo, darkMat);
      lLeg.position.set(-0.35, 0.9, 0);
      group.add(lLeg);
      const rLeg = new THREE.Mesh(legGeo, darkMat);
      rLeg.position.set(0.35, 0.9, 0);
      group.add(rLeg);

      // Feet
      const footGeo = new THREE.BoxGeometry(0.45, 0.2, 0.6);
      const lFoot = new THREE.Mesh(footGeo, mat);
      lFoot.position.set(-0.35, 0.15, 0.1);
      group.add(lFoot);
      const rFoot = new THREE.Mesh(footGeo, mat);
      rFoot.position.set(0.35, 0.15, 0.1);
      group.add(rFoot);

      // Unique features based on bodyType
      if (config.bodyType === 'commander') {
        const crown = new THREE.Mesh(new THREE.ConeGeometry(0.2, 0.4, 4), glowMat);
        crown.position.y = 4.15;
        group.add(crown);
      } else if (config.bodyType === 'heavy') {
        const backpack = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.2, 0.5), mat);
        backpack.position.set(0, 2.5, -0.6);
        group.add(backpack);
      } else if (config.bodyType === 'giant') {
        group.scale.set(1.3, 1.3, 1.3);
      } else if (config.bodyType === 'scout') {
        const wing1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 1.0), mat);
        wing1.position.set(-0.7, 3.0, -0.5);
        wing1.rotation.z = 0.3;
        group.add(wing1);
        const wing2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 1.0), mat);
        wing2.position.set(0.7, 3.0, -0.5);
        wing2.rotation.z = -0.3;
        group.add(wing2);
      } else if (config.bodyType === 'medic') {
        const cross = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 0.1), glowMat);
        cross.position.set(0, 2.8, 0.42);
        group.add(cross);
        const cross2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.1), glowMat);
        cross2.position.set(0, 2.8, 0.42);
        group.add(cross2);
      } else if (config.bodyType === 'spider') {
        for (let i = 0; i < 4; i++) {
          const extraArm = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.8, 0.15), mat);
          const angle = (i / 4) * Math.PI - Math.PI / 2;
          extraArm.position.set(Math.cos(angle) * 0.8, 2.0, Math.sin(angle) * 0.8 - 0.5);
          extraArm.rotation.z = angle * 0.5;
          group.add(extraArm);
        }
      }

      // Position
      group.position.set(config.pos[0], config.pos[1], config.pos[2]);
      group.userData = { config, lArm, rArm, head, visor, lLeg, rLeg };

      return group;
    }

    // ─── Create All Agents ─────────────────────────────────────────────────
    const agentMeshes = [];
    AGENTS.forEach(config => {
      const transformer = buildTransformer(config);
      scene.add(transformer);
      agentMeshes.push(transformer);
    });

    // ─── Particles (ambient) ──────────────────────────────────────────────
    const particleGeo = new THREE.BufferGeometry();
    const particleCount = 200;
    const positions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount * 3; i++) {
      positions[i] = (Math.random() - 0.5) * 40;
    }
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({ color: 0xC9A84C, size: 0.05, transparent: true, opacity: 0.4 });
    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    // ─── Animation Loop ────────────────────────────────────────────────────
    const clock = new THREE.Clock();
    let hoveredAgent = null;

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      agentMeshes.forEach((mesh, i) => {
        const { lArm, rArm, head, lLeg, rLeg } = mesh.userData;
        const phase = i * 0.5;

        // Idle breathing animation
        mesh.position.y = Math.sin(t * 1.5 + phase) * 0.05;

        // Arm sway
        if (lArm) lArm.rotation.x = Math.sin(t * 2 + phase) * 0.15;
        if (rArm) rArm.rotation.x = Math.sin(t * 2 + phase + Math.PI) * 0.15;

        // Head look
        if (head) head.rotation.y = Math.sin(t * 0.5 + phase) * 0.2;

        // Leg shift
        if (lLeg) lLeg.rotation.x = Math.sin(t * 1.8 + phase) * 0.05;
        if (rLeg) rLeg.rotation.x = Math.sin(t * 1.8 + phase + Math.PI) * 0.05;

        // Slow rotation towards camera
        mesh.rotation.y = Math.sin(t * 0.3 + phase) * 0.15;
      });

      // Particles float
      particles.rotation.y = t * 0.02;

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // ─── Raycaster for hover ───────────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const infoPanel = document.getElementById('agent-info');

    renderer.domElement.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      let found = null;
      for (const mesh of agentMeshes) {
        const box = new THREE.Box3().setFromObject(mesh);
        if (raycaster.ray.intersectsBox(box)) {
          found = mesh.userData.config;
          break;
        }
      }

      if (found) {
        document.getElementById('info-name').textContent = found.name;
        document.getElementById('info-role').textContent = found.role;
        document.getElementById('info-status').textContent = `Agent ${found.id} · Ready`;
        infoPanel.classList.add('show');
      } else {
        infoPanel.classList.remove('show');
      }
    });

    // ─── Resize ────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── Clock ─────────────────────────────────────────────────────────────
    setInterval(() => {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-ZA', { timeZone: 'Africa/Johannesburg' }) + ' SAST';
    }, 1000);

    // ─── Fetch live status ─────────────────────────────────────────────────
    async function updateStatus() {
      try {
        const res = await fetch(`${API}/api/agents`);
        const data = await res.json();
        data.agents?.forEach(a => {
          const mesh = agentMeshes.find(m => m.userData.config.id === a.id);
          if (mesh) {
            const visor = mesh.userData.visor;
            if (visor && a.status === 'busy') {
              visor.material.emissiveIntensity = 1.5;
            } else if (visor) {
              visor.material.emissiveIntensity = 0.8;
            }
          }
        });
      } catch {}
    }
    setInterval(updateStatus, 3000);
    updateStatus();
  </script>
</body>
</html>
