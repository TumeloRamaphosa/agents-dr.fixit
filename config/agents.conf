# Dr.Fixit Agent Registry
# Format: agent_name|health_url|pid_file|type|dependencies
# 
# agent_name:    Unique identifier
# health_url:    HTTP endpoint that returns 200 when healthy
# pid_file:      Path to PID file for process checks
# type:          server|desktop|service
# dependencies:  Comma-separated list of required agents (optional)

# === Core Infrastructure ===

# Hermes 3 MLX Inference Server
# The ML backend - must be running before desktop app
hermes-3-mlx|http://127.0.0.1:8000/v1/models|/tmp/hermes-3-mlx.pid|server|

# === Desktop Applications ===

# Hermes Desktop App (GUI)
# Depends on hermes-3-mlx being healthy
hermes-desktop|process:///tmp/hermes-desktop.pid|/tmp/hermes-desktop.pid|desktop|hermes-3-mlx

# === Optional Agents (uncomment to enable) ===

# Ollama (alternative inference)
# ollama|http://127.0.0.1:11434/api/tags|/tmp/ollama.pid|server|

# n8n Workflow Automation
# n8n|http://127.0.0.1:5678/health|/tmp/n8n.pid|server|

# ChromaDB Vector Store
# chromadb|http://127.0.0.1:8000/api/v1/heartbeat|/tmp/chroma.pid|server|

# Custom Python Service
# my-service|http://127.0.0.1:9000/health|/tmp/my-service.pid|service|
