# Single Super Agents VM — command plane + MiMo API + Daytona inventory
# Deploy: cd infra/fly/super-agents && fly deploy

app = "super-agents"
primary_region = "jnb"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  SUPER_AGENTS_NAME = "Super Agents"
  SUPER_AGENTS_SANDBOX_NAME = "Super Agents"
  SUPER_AGENTS_PUBLIC_URL = "https://super-agents.fly.dev"
  NOUS_API_BASE = "https://inference-api.nousresearch.com/v1"
  NOUS_MODEL = "Hermes-4-70B"
  DEFAULT_LLM_PROVIDER = "nous"
  MIMO_API_BASE = "https://api.xiaomimimo.com/v1"
  MIMO_MODEL = "mimo-v2.5-pro"
  OPENAI_MODEL = "gpt-4o"
  CORS_ALLOW_ORIGINS = "https://superagents-site.vercel.app,https://stud.exchange,https://superagents-site.fly.dev"
